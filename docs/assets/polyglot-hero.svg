<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Polyglot Learning OS terminal workflow</title>
  <desc id="desc">A clean terminal-inspired README banner showing a language learning workflow.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .ink { fill: #202124; }
      .muted { fill: #5f6368; }
      .panel { fill: #f8fafc; stroke: #d9dee6; stroke-width: 1.4; }
      .terminal { fill: #111827; }
      .terminal-line { fill: #e5e7eb; }
      .prompt { fill: #5eead4; }
      .accent { fill: #a24936; }
      .ok { fill: #1f6f67; }
      .line { stroke: #c4cad3; stroke-width: 2; fill: none; }
      text { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .title { font-size: 50px; font-weight: 720; letter-spacing: -0.4px; }
      .subtitle { font-size: 22px; fill: #5f6368; }
      .small { font-size: 18px; font-weight: 560; }
      .label { font-size: 22px; font-weight: 680; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="520"/>
  <text x="92" y="100" class="title ink">Polyglot Learning OS</text>
  <text x="96" y="139" class="subtitle">A study loop that reads evidence, routes practice, and stores progress.</text>

  <rect x="90" y="192" width="640" height="236" rx="18" class="terminal"/>
  <circle cx="128" cy="226" r="7" fill="#ff6b6b"/>
  <circle cx="152" cy="226" r="7" fill="#f4bf4f"/>
  <circle cx="176" cy="226" r="7" fill="#61c454"/>
  <text x="126" y="278" class="mono small prompt">$ polyglot-router</text>
  <text x="126" y="316" class="mono small terminal-line">goal: Spanish A1 -> A2</text>
  <text x="126" y="354" class="mono small terminal-line">time: 30 min / day</text>
  <text x="126" y="392" class="mono small terminal-line">next: review + grammar + role-play</text>

  <rect x="860" y="184" width="260" height="92" rx="16" class="panel"/>
  <circle cx="904" cy="230" r="17" class="ok"/>
  <text x="938" y="237" class="label ink">Roadmap</text>

  <rect x="860" y="318" width="260" height="92" rx="16" class="panel"/>
  <circle cx="904" cy="364" r="17" class="accent"/>
  <text x="938" y="371" class="label ink">Practice</text>

  <rect x="1224" y="184" width="260" height="92" rx="16" class="panel"/>
  <circle cx="1268" cy="230" r="17" fill="#b08a2e"/>
  <text x="1302" y="237" class="label ink">Notes</text>

  <rect x="1224" y="318" width="260" height="92" rx="16" class="panel"/>
  <circle cx="1268" cy="364" r="17" class="ok"/>
  <text x="1302" y="371" class="label ink">Memory</text>

  <path d="M730 300 C780 300, 792 230, 850 230" class="line"/>
  <path d="M730 320 C785 320, 796 364, 850 364" class="line"/>
  <path d="M1120 230 H1214" class="line"/>
  <path d="M1120 364 H1214" class="line"/>
  <path d="M1354 318 C1342 298, 1342 296, 1354 276" class="line"/>

  <rect x="90" y="458" width="1396" height="2" fill="#edf0f3"/>
  <text x="92" y="486" class="mono" font-size="16" fill="#7b818a">assess -> plan -> review -> teach -> practice -> feedback -> notes -> adapt</text>
</svg>
